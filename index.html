<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>חי שיווק – קטלוג מוצרים</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@500;700;800&family=Assistant:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#14213D; --bg:#F6F7F9; --card:#FFFFFF; --line:#E5E8EE;
  --green:#16A34A; --green-dark:#128A3E; --amber:#D97706; --red:#DC2626;
  --muted:#6B7280;
}
*{box-sizing:border-box; margin:0; padding:0}
html{-webkit-text-size-adjust:100%}
body{font-family:'Assistant',sans-serif; background:var(--bg); color:var(--ink); font-size:16px}
h1,h2,h3,.logo{font-family:'Rubik',sans-serif}
button{font-family:inherit; cursor:pointer; border:none; background:none; font-size:inherit}
input,select,textarea{font-family:inherit; font-size:16px}
img{display:block; max-width:100%}

/* Header */
header{position:sticky; top:0; z-index:40; background:var(--ink); color:#fff; padding:10px 14px; box-shadow:0 2px 10px rgba(20,33,61,.25)}
.hrow{display:flex; align-items:center; justify-content:space-between; gap:10px; max-width:1100px; margin:0 auto}
.logo{font-size:24px; font-weight:800; letter-spacing:-.5px; white-space:nowrap}
.logo b{color:#4ADE80}
.searchwrap{flex:1; max-width:520px; position:relative}
.searchwrap input{width:100%; border:none; border-radius:99px; padding:9px 40px 9px 14px; background:#fff; color:var(--ink)}
.searchwrap svg{position:absolute; top:50%; right:13px; transform:translateY(-50%); width:17px; height:17px; stroke:var(--muted)}
.vat{background:#1E2E52; color:#C6D3F0; text-align:center; font-size:12.5px; padding:4px}

.hcol{max-width:1100px;margin:0 auto;display:flex;flex-direction:column;gap:9px}
.bsd{font-size:11px;color:#AEB9D6;font-weight:600;line-height:1;margin-bottom:2px}
.hcol .searchwrap{max-width:none;width:100%}
/* Category chips */
.chips{display:flex; gap:8px; overflow-x:auto; padding:12px 14px; max-width:1100px; margin:0 auto; scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto; background:var(--card); border:1.5px solid var(--line); border-radius:99px; padding:7px 15px; font-weight:600; font-size:14px; color:var(--ink); transition:.15s}
.chip.on{background:var(--ink); border-color:var(--ink); color:#fff}

main{max-width:1100px; margin:0 auto; padding:0 14px 110px}
.sect{margin-top:18px}
.secthead{display:flex; align-items:center; gap:8px; margin-bottom:10px}
.secthead h2{font-size:19px; font-weight:700}
.secthead .tag{font-size:12px; font-weight:700; border-radius:6px; padding:2px 8px; color:#fff}
.tag.sale{background:var(--amber)} .tag.new{background:var(--green)}

/* Product grid */
.grid{display:grid; grid-template-columns:repeat(2,1fr); gap:10px}
@media(min-width:640px){.grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:900px){.grid{grid-template-columns:repeat(4,1fr)}}
.pcard{background:var(--card); border:1px solid var(--line); border-radius:14px; overflow:hidden; display:flex; flex-direction:column; position:relative}
.pimg{aspect-ratio:1; background:#fff; display:flex; align-items:center; justify-content:center; padding:10px}
.pimg img{max-height:100%; object-fit:contain}
.pimg .noimg{color:#C3C9D4; font-size:13px}
.pbody{padding:10px 12px 12px; display:flex; flex-direction:column; gap:4px; flex:1}
.pname{font-weight:700; font-size:14.5px; line-height:1.25; min-height:2.4em}
.psku{color:var(--muted); font-size:12px}
.prices{display:flex; align-items:baseline; gap:7px; margin-top:2px}
.pprice{font-family:'Rubik'; font-weight:700; font-size:17px}
.pold{color:var(--muted); text-decoration:line-through; font-size:13px}
.ptier{font-size:12px; color:var(--green-dark); font-weight:600; background:#EAF7EF; border-radius:6px; padding:2px 7px; width:fit-content}
.addbtn{margin-top:auto; background:var(--green); color:#fff; font-weight:700; border-radius:9px; padding:9px; transition:.15s}
.addbtn:active{transform:scale(.97)}
.addbtn.inc{background:#EAF7EF; color:var(--green-dark); display:flex; align-items:center; justify-content:space-between; padding:5px 8px}
.addbtn.inc b{font-size:17px; padding:2px 12px}
.badge{position:absolute; top:8px; right:8px; z-index:2; font-size:11.5px; font-weight:700; color:#fff; border-radius:6px; padding:3px 8px}
.badge.sale{background:var(--amber)} .badge.new{background:var(--green)}
.oos .pimg{filter:grayscale(1); opacity:.55}
.oosband{position:absolute; top:42%; left:0; right:0; background:rgba(220,38,38,.92); color:#fff; text-align:center; font-weight:700; padding:5px; font-size:13.5px; z-index:2}
.oosbtn{margin-top:auto; background:#F1F2F5; color:#9AA1AE; font-weight:700; border-radius:9px; padding:9px; cursor:not-allowed}

/* Cart bar & drawer */
.cartbar{position:fixed; bottom:0; left:0; right:0; z-index:50; background:var(--ink); color:#fff; padding:11px 16px; display:none; align-items:center; justify-content:space-between; gap:12px; box-shadow:0 -3px 14px rgba(0,0,0,.18)}
.cartbar.show{display:flex}
.cartbar .sum{font-family:'Rubik'; font-weight:700; font-size:17px}
.cartbar button{background:var(--green); color:#fff; font-weight:700; border-radius:99px; padding:10px 22px}
.overlay{position:fixed; inset:0; background:rgba(15,23,42,.5); z-index:60; display:none}
.overlay.show{display:block}
.drawer{position:fixed; bottom:0; left:0; right:0; z-index:70; background:#fff; border-radius:18px 18px 0 0; max-height:82vh; display:flex; flex-direction:column; transform:translateY(105%); transition:.25s}
.drawer.show{transform:none}
.dhead{display:flex; align-items:center; justify-content:space-between; padding:14px 16px; border-bottom:1px solid var(--line)}
.dhead h3{font-size:18px}
.dlist{overflow-y:auto; padding:6px 16px; flex:1}
.drow{display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid var(--line)}
.drow img{width:52px; height:52px; object-fit:contain; border:1px solid var(--line); border-radius:9px; background:#fff}
.dinfo{flex:1; min-width:0}
.dinfo .n{font-weight:700; font-size:14px}
.dinfo .s{color:var(--muted); font-size:12px}
.qty{display:flex; align-items:center; gap:2px; background:#F1F2F5; border-radius:99px}
.qty button{width:30px; height:30px; font-size:17px; font-weight:700; color:var(--ink)}
.qty b{min-width:22px; text-align:center; font-size:14px}
.dsum{padding:13px 16px; border-top:1px solid var(--line)}
.dsum .row{display:flex; justify-content:space-between; font-weight:700; font-size:17px; margin-bottom:10px}
.wabtn{width:100%; display:flex; align-items:center; justify-content:center; gap:9px; background:var(--green); color:#fff; font-weight:700; font-size:16.5px; border-radius:12px; padding:13px}
.wabtn svg{width:21px; height:21px; fill:#fff}

footer{background:var(--ink); color:#B9C4DC; text-align:center; padding:26px 16px 34px; margin-top:36px; font-size:14px}
footer .big{color:#fff; font-weight:700; font-size:16px; margin-bottom:5px}
.empty{text-align:center; color:var(--muted); padding:44px 0; font-size:15px}

/* Admin */
.adminbar{background:var(--amber); color:#fff; text-align:center; font-weight:700; padding:7px; font-size:14px}
.awrap{max-width:1100px; margin:0 auto; padding:16px 14px 60px}
.abtns{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px}
.abtn{background:var(--ink); color:#fff; font-weight:700; border-radius:9px; padding:10px 16px; font-size:14.5px}
.abtn.g{background:var(--green)} .abtn.o{background:#fff; color:var(--ink); border:1.5px solid var(--line)}
.atable{width:100%; background:#fff; border:1px solid var(--line); border-radius:12px; overflow:hidden}
.arow{display:flex; align-items:center; gap:10px; padding:10px 12px; border-bottom:1px solid var(--line)}
.arow:last-child{border-bottom:none}
.arow img{width:44px; height:44px; object-fit:contain; border:1px solid var(--line); border-radius:8px}
.ainfo{flex:1; min-width:0}
.ainfo .n{font-weight:700; font-size:14px}
.ainfo .m{color:var(--muted); font-size:12px}
.aact{display:flex; gap:6px}
.aact button{font-size:13px; font-weight:700; border-radius:7px; padding:6px 11px}
.ed{background:#EAF0FB; color:#1D4ED8} .dl{background:#FDECEC; color:var(--red)}
.oostag{font-size:11px; font-weight:700; color:var(--red); background:#FDECEC; border-radius:5px; padding:2px 6px}
.modal{position:fixed; inset:0; z-index:80; background:rgba(15,23,42,.55); display:none; align-items:flex-start; justify-content:center; overflow-y:auto; padding:20px 12px}
.modal.show{display:flex}
.mbox{background:#fff; border-radius:16px; width:100%; max-width:480px; padding:20px}
.mbox h3{margin-bottom:14px; font-size:18px}
.fld{margin-bottom:12px}
.fld label{display:block; font-weight:700; font-size:13.5px; margin-bottom:5px}
.fld input,.fld select{width:100%; border:1.5px solid var(--line); border-radius:9px; padding:9px 12px; background:#fff}
.fld .hint{font-size:12px; color:var(--muted); margin-top:3px}
.two{display:grid; grid-template-columns:1fr 1fr; gap:10px}
.chk{display:flex; align-items:center; gap:8px; font-weight:600; font-size:14.5px; margin-bottom:9px}
.chk input{width:18px; height:18px}
.mact{display:flex; gap:8px; margin-top:16px}
.mact .save{flex:1; background:var(--green); color:#fff; font-weight:700; border-radius:10px; padding:12px}
.mact .cancel{background:#F1F2F5; color:var(--ink); font-weight:700; border-radius:10px; padding:12px 18px}
.imgprev{width:84px; height:84px; object-fit:contain; border:1.5px dashed var(--line); border-radius:10px; margin-top:6px; background:#fff}
.loginbox{max-width:340px; margin:80px auto; background:#fff; border:1px solid var(--line); border-radius:16px; padding:26px; text-align:center}
.loginbox h2{margin-bottom:14px}
.loginbox input{width:100%; border:1.5px solid var(--line); border-radius:9px; padding:11px; text-align:center; font-size:18px; letter-spacing:3px}
.loginbox button{width:100%; margin-top:12px; background:var(--ink); color:#fff; font-weight:700; border-radius:10px; padding:12px}
.err{color:var(--red); font-size:13.5px; margin-top:8px; font-weight:600}
.toast{position:fixed; bottom:86px; left:50%; transform:translateX(-50%); background:var(--ink); color:#fff; font-weight:600; border-radius:99px; padding:9px 20px; z-index:90; font-size:14px; opacity:0; transition:.25s; pointer-events:none; white-space:nowrap}
.toast.show{opacity:1}

/* Print catalog */
#printcat{display:none}
@media print{
  body *{visibility:hidden}
  #printcat, #printcat *{visibility:visible}
  #printcat{display:block; position:absolute; top:0; left:0; right:0}
  .pc-head{text-align:center; padding:18px 0 8px; border-bottom:3px solid #14213D; margin-bottom:14px}
  .pc-head h1{font-size:30px}
  .pc-head p{color:#555; font-size:13px}
  .pc-cat{font-size:19px; font-weight:700; margin:16px 0 8px; border-right:5px solid #16A34A; padding-right:9px; page-break-after:avoid}
  .pc-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:9px}
  .pc-card{border:1px solid #ddd; border-radius:9px; padding:8px; text-align:center; page-break-inside:avoid}
  .pc-card img{height:88px; object-fit:contain; margin:0 auto 5px}
  .pc-card .n{font-weight:700; font-size:12.5px}
  .pc-card .s{color:#777; font-size:10.5px}
  .pc-card .p{font-weight:700; font-size:14px; margin-top:2px}
}
/* Product page */
.backbtn{display:flex;align-items:center;gap:6px;background:#fff;border:1.5px solid var(--line);border-radius:99px;padding:7px 16px;font-weight:700;margin:14px 0 4px}
.pp{background:#fff;border:1px solid var(--line);border-radius:16px;overflow:hidden;margin-top:10px}
.ppmainwrap{background:#fff;display:flex;align-items:center;justify-content:center;padding:16px;min-height:230px}
.ppmainwrap img{max-height:300px;object-fit:contain}
.ppthumbs{display:flex;gap:8px;padding:0 14px 12px;overflow-x:auto}
.ppthumbs img{width:58px;height:58px;object-fit:contain;border:2px solid var(--line);border-radius:9px;background:#fff;cursor:pointer}
.ppthumbs img.on{border-color:var(--green)}
.ppbody{padding:16px;border-top:1px solid var(--line)}
.ppbody h1{font-size:21px;margin-bottom:4px}
.ppdesc{margin-top:12px;font-size:15px;line-height:1.65;color:#333;white-space:pre-line;border-top:1px solid var(--line);padding-top:12px}
.ppadd{margin-top:14px}
.ppadd .addbtn{width:100%;padding:12px;font-size:16px}
/* Category manager */
.catrow{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--line)}
.catrow input{flex:1;border:1.5px solid var(--line);border-radius:8px;padding:8px 10px}
.catrow .dl:disabled{opacity:.35;cursor:not-allowed}
@media (prefers-reduced-motion: reduce){ *{transition:none !important} }
</style>
</head>
<body>

<div id="app"></div>
<div id="printcat"></div>
<div class="toast" id="toast"></div>

<script>

const WA_NUMBER = "972528864040";
const ADMIN_PASS = "4040";
const GH_OWNER = "Chaishivuk";
const GH_REPO = "Chai-shivuk";
const GH_API = "https://api.github.com/repos/" + GH_OWNER + "/" + GH_REPO + "/contents/";

let DB = null, cart = {}, view = {cat:"home", q:"", page:"list", pid:null};
let pendingImgs = {};   // repo path -> base64 body awaiting upload

function ghToken(){ try{ return localStorage.getItem("gh-token") || ""; }catch(e){ return ""; } }
function setGhToken(t){ try{ localStorage.setItem("gh-token", t.trim()); }catch(e){} }
function ghHeaders(){ return {"Authorization": "Bearer " + ghToken(), "Accept": "application/vnd.github+json"}; }

async function loadDB(){
  try{
    const r = await fetch("data.json?t=" + Date.now(), {cache: "no-store"});
    if(!r.ok) throw new Error(r.status);
    DB = await r.json();
    DB.settings = DB.settings || {};
  }catch(e){
    document.getElementById("app").innerHTML =
      '<div class="empty">שגיאה בטעינת הקטלוג – בדוק חיבור לאינטרנט ורענן את הדף</div>';
    throw e;
  }
}
async function ghGetSha(path){
  const r = await fetch(GH_API + path + "?t=" + Date.now(), {headers: ghHeaders(), cache: "no-store"});
  if(r.status === 404) return null;
  if(!r.ok) throw new Error("get " + r.status);
  return (await r.json()).sha;
}
async function ghPut(path, b64, msg){
  const sha = await ghGetSha(path);
  const body = {message: msg, content: b64, branch: "main"};
  if(sha) body.sha = sha;
  const r = await fetch(GH_API + path, {method: "PUT", headers: ghHeaders(), body: JSON.stringify(body)});
  if(!r.ok) throw new Error("put " + r.status);
}
function b64Unicode(str){
  const bytes = new TextEncoder().encode(str);
  let bin = ""; bytes.forEach(b => bin += String.fromCharCode(b));
  return btoa(bin);
}
async function saveDB(){
  if(!ghToken()){ toast("חסר מפתח גישה – התחבר מחדש לניהול"); return false; }
  toast("שומר...");
  try{
    for(const [path, b64] of Object.entries(pendingImgs)){
      await ghPut(path, b64, "עדכון תמונה");
    }
    pendingImgs = {};
    await ghPut("data.json", b64Unicode(JSON.stringify(DB)), "עדכון קטלוג");
    toast("נשמר! השינוי יופיע לכולם תוך כדקה");
    return true;
  }catch(e){
    toast("שגיאה בשמירה – בדוק את החיבור והמפתח");
    return false;
  }
}
/* ---------- helpers ---------- */
const $ = s => document.querySelector(s);
const esc = s => String(s ?? "").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const nis = n => "₪" + Number(n).toLocaleString("he-IL");
function toast(msg){
  const t = $("#toast"); t.textContent = msg; t.classList.add("show");
  clearTimeout(t._h); t._h = setTimeout(()=>t.classList.remove("show"), 1800);
}
function effPrice(p, qty){
  let base = (p.sale != null) ? p.sale : p.price;
  if(p.tier && qty >= p.tier.qty) base = Math.min(base, p.tier.price);
  return base;
}
function newSku(){
  let s;
  do{ s = String(Math.floor(1000 + Math.random()*9000)); }
  while(DB.products.some(p => p.sku === s));
  return s;
}
function catName(id){ const c = DB.categories.find(c => c.id === id); return c ? c.name : ""; }

/* ---------- customer render ---------- */
let adminMode = false, logoTaps = 0, logoTimer = null;
function isAdminRoute(){ return adminMode || location.hash === "#admin"; }

function render(){
  if(isAdminRoute()){ renderAdmin(); return; }
  if(view.page === "product"){ renderProduct(); return; }
  const app = $("#app");
  const chips = [
    {id:"home", name:"ראשי"},
    {id:"all", name:"כל המוצרים"},
    ...DB.categories
  ].map(c => `<button class="chip ${view.cat===c.id?"on":""}" data-cat="${c.id}">${esc(c.name)}</button>`).join("");

  let body = "";
  const q = view.q.trim();
  if(q){
    const found = DB.products.filter(p =>
      p.name.includes(q) || p.sku.includes(q));
    body = section(`תוצאות חיפוש (${found.length})`, "", found);
  } else if(view.cat === "home"){
    const sale = DB.products.filter(p => p.sale != null);
    const nw = DB.products.filter(p => p.isNew);
    body =
      (sale.length ? section("מבצעים", "sale", sale) : "") +
      (nw.length ? section("מוצרים חדשים", "new", nw) : "") +
      DB.categories.map(c => {
        const ps = DB.products.filter(p => p.cat === c.id);
        return ps.length ? section(c.name, "", ps) : "";
      }).join("");
    if(!body) body = `<div class="empty">הקטלוג יעודכן בקרוב</div>`;
  } else if(view.cat === "all"){
    body = section("כל המוצרים", "", DB.products);
  } else {
    const ps = DB.products.filter(p => p.cat === view.cat);
    body = ps.length ? section(catName(view.cat), "", ps)
                     : `<div class="empty">אין עדיין מוצרים בקטגוריה זו</div>`;
  }

  app.innerHTML = `
  <header>
    <div class="hcol">
      <div><div class="bsd">בס"ד</div><div class="logo">חי <b>שיווק</b></div></div>
      <div class="searchwrap">
        <input id="search" placeholder="חיפוש לפי שם או מק&quot;ט..." value="${esc(view.q)}">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2.4"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.5-3.5"/></svg>
      </div>
    </div>
  </header>
  <div class="vat">המחירים כוללים מע"מ</div>
  <nav class="chips">${chips}</nav>
  <main>${body}</main>
  <footer>
    <div class="big">למכירה בכמויות – צרו קשר</div>
    <div>וואטסאפ: 052-886-4040 · חי שיווק</div>
  </footer>
  <div class="cartbar" id="cartbar">
    <div><div style="font-size:12.5px;color:#B9C4DC" id="cbcount"></div><div class="sum" id="cbsum"></div></div>
    <button id="opencart">לצפייה בהזמנה</button>
  </div>
  <div class="overlay" id="overlay"></div>
  <div class="drawer" id="drawer">
    <div class="dhead"><h3>ההזמנה שלי</h3><button id="closecart" style="font-size:22px">✕</button></div>
    <div class="dlist" id="dlist"></div>
    <div class="dsum">
      <div class="row"><span>סה"כ לתשלום</span><b id="dtotal"></b></div>
      <button class="wabtn" id="sendwa">
        <svg viewBox="0 0 24 24"><path d="M12.04 2C6.58 2 2.13 6.45 2.13 11.91c0 1.75.46 3.45 1.32 4.95L2 22l5.25-1.38a9.87 9.87 0 0 0 4.79 1.22c5.46 0 9.91-4.45 9.91-9.91C21.95 6.45 17.5 2 12.04 2zm5.83 14.12c-.25.7-1.44 1.34-2 1.42-.51.08-1.16.11-1.87-.12-.43-.14-.98-.32-1.69-.62-2.98-1.29-4.92-4.29-5.07-4.49-.15-.2-1.21-1.61-1.21-3.07 0-1.46.77-2.18 1.04-2.48.27-.3.6-.37.8-.37.2 0 .4 0 .57.01.18.01.43-.07.67.51.25.6.85 2.07.92 2.22.08.15.13.33.03.53-.1.2-.15.32-.3.5-.15.18-.31.4-.45.53-.15.15-.31.31-.13.61.18.3.79 1.3 1.7 2.11 1.17 1.04 2.15 1.36 2.45 1.52.3.15.48.13.65-.08.18-.2.75-.87.95-1.17.2-.3.4-.25.67-.15.28.1 1.74.82 2.04.97.3.15.5.22.57.35.08.12.08.72-.17 1.42z"/></svg>
        שליחת ההזמנה בוואטסאפ
      </button>
    </div>
  </div>`;

  bindCustomer();
  updateCartUI();
}

function section(title, tag, products){

/* ---------- cart ---------- */
function cartItems(){
  return Object.entries(cart).map(([id, qty]) => {
    const p = DB.products.find(x => x.id === id);
    return p ? {p, qty} : null;
  }).filter(Boolean);
}
function cartTotal(){
  return cartItems().reduce((t, {p, qty}) => t + effPrice(p, qty) * qty, 0);
}
function updateCartUI(){
  const items = cartItems();
  const n = items.reduce((t, i) => t + i.qty, 0);
  const bar = $("#cartbar");
  if(!bar) return;
  if(n === 0){ bar.classList.remove("show"); closeCart(); return; }
  bar.classList.add("show");
  $("#cbcount").textContent = n + " פריטים";
  $("#cbsum").textContent = nis(cartTotal());
}
function openCart(){
  const list = $("#dlist");
  list.innerHTML = cartItems().map(({p, qty}) => `
    <div class="drow">
      ${p.img ? `<img src="${p.img}">` : `<div style="width:52px;height:52px;border:1px solid var(--line);border-radius:9px"></div>`}
      <div class="dinfo">
        <div class="n">${esc(p.name)}</div>
        <div class="s">מק"ט ${p.sku} · ${nis(effPrice(p, qty))} ליח'</div>
      </div>
      <div class="qty">
        <button data-cadd="${p.id}">+</button><b>${qty}</b><button data-csub="${p.id}">−</button>
      </div>
    </div>`).join("");
  $("#dtotal").textContent = nis(cartTotal());
  list.querySelectorAll("[data-cadd]").forEach(b => b.onclick = () => { cart[b.dataset.cadd]++; openCart(); updateCartUI(); });
  list.querySelectorAll("[data-csub]").forEach(b => b.onclick = () => {
    const id = b.dataset.csub;
    cart[id] = Math.max(0, cart[id]-1); if(!cart[id]) delete cart[id];
    if(!Object.keys(cart).length){ closeCart(); render(); return; }
    openCart(); updateCartUI();
  });
  $("#overlay").classList.add("show");
  $("#drawer").classList.add("show");
}
function closeCart(){
  const o = $("#overlay"), d = $("#drawer");
  if(o) o.classList.remove("show");
  if(d) d.classList.remove("show");
}
function sendWA(){
  const items = cartItems();
  if(!items.length) return;
  const n = items.reduce((t, i) => t + i.qty, 0);
  let lines = ["🛒 הזמנה חדשה – חי שיווק", "――――――――――――"];
  items.forEach(({p, qty}, i) => {
    lines.push(`${i + 1}. ${p.name}`);
    lines.push(`    מק"ט ${p.sku} | ${qty} יח' × ${nis(effPrice(p, qty))} = ${nis(effPrice(p, qty) * qty)}`);
  });
  lines.push("――――――――――――");
  lines.push(`סה"כ פריטים: ${n}`);
  lines.push(`💰 סה"כ לתשלום: ${nis(cartTotal())}`);
  lines = lines.map(l => "\u200F" + l);
  const url = "https://wa.me/" + WA_NUMBER + "?text=" + encodeURIComponent(lines.join("\n"));
  window.open(url, "_blank");
}

async function sha256(s){
  const b = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(s));
  return Array.from(new Uint8Array(b)).map(x => x.toString(16).padStart(2, "0")).join("");
}
async function tryLogin(){
  const v = $("#pw").value;
  const stored = DB.settings && DB.settings.passHash;
  const ok = stored ? (await sha256(v)) === stored : v === ADMIN_PASS;
  if(ok){ adminAuthed = true; render(); }
  else $("#loginerr").textContent = "סיסמה שגויה";
}

      stock: $("#f_stock").checked,
      isNew: $("#f_new").checked,
      sale: $("#f_issale").checked ? (parseFloat($("#f_sale").value) || null) : null,
      tier: $("#f_istier").checked ? {
        qty: parseInt($("#f_tqty").value) || 0,
        price: parseFloat($("#f_tprice").value) || 0
      } : null
    };
    if(obj.tier && (!obj.tier.qty || !obj.tier.price)) obj.tier = null;
    if(imgData && imgData.startsWith("data:")){
      const path = "images/" + obj.id + ".jpg";
      pendingImgs[path] = imgData.split(",")[1];
      obj.img = path;
    } else {
      obj.img = imgData;
    }
    obj.desc = $("#f_desc").value.trim();
    obj.imgs = extraImgs.map((s, i) => {
      if(s.startsWith("data:")){
        const path = "images/" + obj.id + "-e" + Date.now() + i + ".jpg";
        pendingImgs[path] = s.split(",")[1];
        return path;
      }
      return s;
    });
    if(p){ DB.products = DB.products.map(x => x.id === p.id ? obj : x); }
    else { DB.products.push(obj); }
    if(await saveDB()){ toast("נשמר"); m.classList.remove("show"); render(); }
  };
}

function openCatManager(){
  const m = $("#modal");
  const rows = DB.categories.map(c => {
    const cnt = DB.products.filter(p => p.cat === c.id).length;
    return `<div class="catrow">
      <input value="${esc(c.name)}" data-cname="${c.id}">
      <span style="font-size:12px;color:var(--muted);white-space:nowrap">${cnt} מוצרים</span>
      <button class="dl" data-cdel="${c.id}" ${cnt ? "disabled title='אי אפשר למחוק קטגוריה עם מוצרים'" : ""}>מחיקה</button>
    </div>`;
  }).join("");
  m.innerHTML = `<div class="mbox">
    <h3>ניהול קטגוריות</h3>
    ${rows}
    <div class="catrow" style="border-bottom:none">
      <input id="newcat" placeholder="שם קטגוריה חדשה">
      <button class="ed" id="addcat">+ הוספה</button>
    </div>
    <div class="hint" style="font-size:12px;color:var(--muted)">מחיקת קטגוריה אפשרית רק כשאין בה מוצרים (העבר אותם קודם לקטגוריה אחרת)</div>
    <div class="mact">
      <button class="save" id="catsave">שמירת שינויים</button>
      <button class="cancel" id="catcancel">סגירה</button>
    </div>
  </div>`;
  m.classList.add("show");
  $("#catcancel").onclick = () => m.classList.remove("show");
  $("#addcat").onclick = () => {
    const name = $("#newcat").value.trim();
    if(!name){ toast("כתוב שם לקטגוריה"); return; }
    DB.categories.push({id: "c" + Date.now(), name});
    openCatManager();
  };
  document.querySelectorAll("[data-cdel]").forEach(b => b.onclick = () => {
    if(!confirm("למחוק את הקטגוריה?")) return;
    DB.categories = DB.categories.filter(c => c.id !== b.dataset.cdel);
    openCatManager();
  });
  $("#catsave").onclick = async () => {
    document.querySelectorAll("[data-cname]").forEach(inp => {
      const c = DB.categories.find(x => x.id === inp.dataset.cname);
      if(c && inp.value.trim()) c.name = inp.value.trim();
    });
    if(await saveDB()){ m.classList.remove("show"); render(); }
  };
}

function loadScript(src){
  return new Promise((res, rej) => {
    const s = document.createElement("script");
    s.src = src; s.onload = res; s.onerror = rej;
    document.head.appendChild(s);
  });
}

async function exportOrderForm(){
  toast("מכין קובץ הזמנה...");
  try{
    if(!window.ExcelJS) await loadScript("https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js");
    const wb = new ExcelJS.Workbook();
    const ws = wb.addWorksheet("הזמנה", {views: [{rightToLeft: true}]});
    ws.columns = [{width: 13}, {width: 36}, {width: 10}, {width: 12}, {width: 14}, {width: 13}];
    const title = ws.addRow(["חי שיווק – טופס הזמנה"]); title.font = {bold: true, size: 16};
    ws.addRow(["המחירים כוללים מע\"מ · מלאו כמות בעמודה \"כמות להזמנה\" ושלחו אלינו: 052-886-4040"]);
    ws.addRow([]);
    const head = ws.addRow(["תמונה", "שם המוצר", "מק\"ט", "מחיר", "כמות להזמנה", "סה\"כ"]);
    head.font = {bold: true};
    head.eachCell(c => c.fill = {type: "pattern", pattern: "solid", fgColor: {argb: "FFE5E8EE"}});
    const dataRows = [];
    for(const c of DB.categories){
      const ps = DB.products.filter(p => p.cat === c.id && p.stock);
      if(!ps.length) continue;
      const cr = ws.addRow([c.name]); cr.font = {bold: true, size: 13};
      cr.getCell(1).fill = {type: "pattern", pattern: "solid", fgColor: {argb: "FFDCFCE7"}};
      ws.mergeCells(cr.number, 1, cr.number, 6);
      const thin = {style: "thin", color: {argb: "FFBFC6D1"}};
      for(const p of ps){
        const price = p.sale != null ? p.sale : p.price;
        const r = ws.addRow(["", p.name + (p.tier ? " (מעל " + p.tier.qty + " יח' – ₪" + p.tier.price + " ליח')" : ""), p.sku, price, "", ""]);
        r.height = 52;
        r.alignment = {vertical: "middle", wrapText: true};
        r.getCell(4).numFmt = '₪#,##0';
        r.getCell(6).value = {formula: "D" + r.number + "*E" + r.number};
        r.getCell(6).numFmt = '₪#,##0';
        r.getCell(5).fill = {type: "pattern", pattern: "solid", fgColor: {argb: "FFFFF3C4"}};
        r.getCell(5).dataValidation = {type: "whole", operator: "between", formulae: [0, 99999], allowBlank: true, showErrorMessage: true, error: "נא להזין מספר שלם"};
        for(let ci = 1; ci <= 6; ci++) r.getCell(ci).border = {top: thin, left: thin, bottom: thin, right: thin};
        dataRows.push(r.number);
        if(p.img){
          try{
            const blob = await (await fetch(p.img)).blob();
            const b64 = await new Promise(rs => {
              const fr = new FileReader();
              fr.onload = () => rs(fr.result.split(",")[1]);
              fr.readAsDataURL(blob);
            });
            const imgId = wb.addImage({base64: b64, extension: "jpeg"});
            ws.addImage(imgId, {tl: {col: 0.12, row: r.number - 1 + 0.06}, ext: {width: 64, height: 60}});
          }catch(e){}
        }
      }
    }
    ws.addRow([]);
    const tot = ws.addRow(["", "", "", "", "סה\"כ לתשלום:", ""]);
    tot.font = {bold: true, size: 13};
    tot.getCell(6).value = {formula: dataRows.length ? "SUM(" + dataRows.map(n => "F" + n).join(",") + ")" : "0"};
    tot.getCell(6).numFmt = '₪#,##0';
    tot.getCell(6).fill = {type: "pattern", pattern: "solid", fgColor: {argb: "FFDCFCE7"}};
    const out = await wb.xlsx.writeBuffer();
    const blob = new Blob([out], {type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "chai-shivuk-order-form.xlsx";
    a.click();
    toast("קובץ ההזמנה ירד");
  }catch(e){
    toast("שגיאה ביצירת הקובץ");
  }
}

function shrinkImage(file){
  return new Promise(res => {
    const img = new Image();
    img.onload = () => {
      const cap = 1000, sc0 = Math.min(1, cap / Math.max(img.width, img.height));
      const c0 = document.createElement("canvas");
      c0.width = Math.max(1, Math.round(img.width * sc0));
      c0.height = Math.max(1, Math.round(img.height * sc0));
      const x0 = c0.getContext("2d");
      x0.fillStyle = "#fff"; x0.fillRect(0, 0, c0.width, c0.height);
      x0.drawImage(img, 0, 0, c0.width, c0.height);
      const d = x0.getImageData(0, 0, c0.width, c0.height).data;
      let minX = c0.width, minY = c0.height, maxX = -1, maxY = -1;
      for(let y = 0; y < c0.height; y++){
        for(let x = 0; x < c0.width; x++){
          const i = (y * c0.width + x) * 4;
          if(d[i] < 244 || d[i+1] < 244 || d[i+2] < 244){
            if(x < minX) minX = x; if(x > maxX) maxX = x;
            if(y < minY) minY = y; if(y > maxY) maxY = y;
          }
        }
      }
      if(maxX < minX || maxY < minY){ minX = 0; minY = 0; maxX = c0.width - 1; maxY = c0.height - 1; }
      const w = maxX - minX + 1, h = maxY - minY + 1;
      const side = Math.max(w, h), pad = Math.round(side * 0.07), box = side + pad * 2;
      const c = document.createElement("canvas"); c.width = c.height = 500;
      const ctx = c.getContext("2d");
      ctx.fillStyle = "#fff"; ctx.fillRect(0, 0, 500, 500);
      const s = 500 / box;
      ctx.drawImage(c0, minX, minY, w, h,
        Math.round((500 - w * s) / 2), Math.round((500 - h * s) / 2),
        Math.round(w * s), Math.round(h * s));
      res(c.toDataURL("image/jpeg", .8));
    };
    img.src = URL.createObjectURL(file);
  });
}

function exportXLS(){
  const go = () => {
    const rows = DB.products.map(p => ({
      "שם המוצר": p.name,
      "מק\"ט": p.sku,
      "קטגוריה": catName(p.cat),
      "מחיר": p.price,
      "מחיר מבצע": p.sale != null ? p.sale : "",
      "כמות למחיר מיוחד": p.tier ? p.tier.qty : "",
      "מחיר לכמות": p.tier ? p.tier.price : "",
      "במלאי": p.stock ? "כן" : "לא"
    }));
    const ws = XLSX.utils.json_to_sheet(rows);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "קטלוג");
    XLSX.writeFile(wb, "chai-shivuk-catalog.xlsx");
  };
  if(window.XLSX){ go(); return; }
  const s = document.createElement("script");
  s.src = "https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js";
  s.onload = go;
  s.onerror = () => toast("שגיאה בטעינת הייצוא");
  document.head.appendChild(s);
}
